<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MIDI CTRL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;500;600;700;800;900&family=Bitcount+Grid+Single:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system/tokens.css">
<link rel="stylesheet" href="design-system/elements.css">
</head>
<body>

<div class="val-overlay" id="valOverlay">
  <div class="val-num" id="valNum">000</div>
  <div class="val-hint" id="valHint"></div>
</div>

<div class="scene">
  <div class="dot-bg"></div>
  <div class="scanlines"></div>
  <div class="noise"></div>
  <div class="bg-pulse" id="bgPulse"></div>

  <div class="anno anno--tl">SYS:WEBMIDI/1.0<br>PROTOCOL:RTP</div>
  <div class="anno anno--tr">LAYOUT:DYNAMIC<br>GRID:22×22</div>
  <div class="anno anno--bl">CC:070-119<br>NOTE:036-127</div>
  <div class="anno anno--br">DEVICE:001<br>CH:01/16</div>

  <header class="hdr">
    <div class="logo">
      <span class="logo-mark">MIDI<span class="logo-dot">·</span>CTRL</span>
      <span class="logo-sub">PHASE·2</span>
      <span class="logo-jp">コントローラ</span>
    </div>
    <div class="hdr-center">
      <div class="bpm">
        <div class="bpm-led"></div>
        <span class="bpm-num">128</span>
        <span>BPM</span>
      </div>
    </div>
    <div class="hdr-right">
      <select class="port-select" id="portSelect" style="display:none">
        <option value="">— port —</option>
      </select>
      <div class="conn" id="conn">
        <div class="conn-dot" id="connDot"></div>
        <span id="connText">NO MIDI</span>
      </div>
    </div>
  </header>

  <main class="cvs" id="canvas"></main>

  <!-- Mode control: bottom-left, always visible -->
  <div class="mode-control" id="modeControl">
    <div class="segmented" id="modeSegmented">
      <button class="seg-btn is-active" data-mode="play">Play</button>
      <button class="seg-btn" data-mode="edit">Edit</button>
    </div>
    <button class="add-btn" id="addBtn" aria-label="Add element">+</button>
  </div>

  <footer class="ftr">
    <div class="log" id="log">— READY —</div>
    <div class="ftr-jp">出力</div>
    <div class="act-wrap">
      <span class="act-lbl">TX</span>
      <div class="act" id="actLed"></div>
      <span class="act-lbl">RX</span>
      <div class="act" id="rxLed"></div>
    </div>
  </footer>
</div>

<!-- Drawer and toast are injected by JS -->

<div class="midi-overlay hidden" id="midiOverlay">
  <div class="midi-overlay-card">
    <div class="midi-overlay-title">MIDI CTRL</div>
    <div class="midi-overlay-body">
      Requires Web MIDI API.<br><br>
      <strong>Desktop:</strong> Chrome, Edge, Brave<br>
      <strong>iPad:</strong> WebMIDI Browser
    </div>
    <button class="midi-overlay-btn" id="overlayDismiss">DEMO MODE</button>
  </div>
</div>

<script type="module">
import MIDITransport   from './core/transport.js';
import { layout, addElement, removeElement, updateElement, duplicateElement, saveLayout }
                       from './core/layout.js';
import { renderCanvas } from './ui/canvas.js';
import { activateEditMode } from './ui/editMode.js';
import { createDrawer } from './ui/drawer.js';
import { showToast }   from './ui/toast.js';

// ── DOM refs ────────────────────────────────────────────────────────────────
const transport  = new MIDITransport();
const canvasEl   = document.getElementById('canvas');
const connDot    = document.getElementById('connDot');
const connText   = document.getElementById('connText');
const portSelect = document.getElementById('portSelect');
const logEl      = document.getElementById('log');
const actLed     = document.getElementById('actLed');
const rxLed      = document.getElementById('rxLed');
const bgPulse    = document.getElementById('bgPulse');
const valOverlay = document.getElementById('valOverlay');
const valNumEl   = document.getElementById('valNum');
const valHintEl  = document.getElementById('valHint');
const overlay    = document.getElementById('midiOverlay');
const modeSegmented = document.getElementById('modeSegmented');
const addBtn     = document.getElementById('addBtn');

let hideT = null, pulseT = null, actT = null, rxT = null, logT = null;

// ── UI helpers ───────────────────────────────────────────────────────────────
const ui = {
  showVal(v, hint) {
    valNumEl.textContent  = typeof v === 'number' ? String(v).padStart(3, '0') : v;
    valHintEl.textContent = hint || '';
    valOverlay.classList.add('visible');
    clearTimeout(hideT);
  },
  hideVal() {
    clearTimeout(hideT);
    hideT = setTimeout(() => valOverlay.classList.remove('visible'), 200);
  },
  pulseStart() {
    bgPulse.classList.add('active');
    clearTimeout(pulseT);
  },
  pulseEnd() {
    clearTimeout(pulseT);
    pulseT = setTimeout(() => bgPulse.classList.remove('active'), 200);
  },
};

// ── Canvas ───────────────────────────────────────────────────────────────────
const canvasApi = renderCanvas(canvasEl, layout, transport, ui);

// ── Drawer ───────────────────────────────────────────────────────────────────
const drawer = createDrawer(document.querySelector('.scene'));

function openElementDrawer(elementData) {
  drawer.openElement(elementData, {
    onSave(patch) {
      updateElement(layout, elementData.id, patch);
      canvasApi.refresh(layout);
      if (currentMode === 'edit') reactivateEditMode();
    },
    onDelete() {
      const snapshot = { ...elementData };
      removeElement(layout, elementData.id);
      canvasApi.refresh(layout);
      if (currentMode === 'edit') reactivateEditMode();
      showToast('Element deleted', () => {
        layout.elements.push(snapshot);
        saveLayout(layout);
        canvasApi.refresh(layout);
        if (currentMode === 'edit') reactivateEditMode();
      });
    },
    onDuplicate() {
      duplicateElement(layout, elementData.id);
      canvasApi.refresh(layout);
      if (currentMode === 'edit') reactivateEditMode();
    },
  });
}

// ── Mode switching ────────────────────────────────────────────────────────────
let currentMode      = 'play';
let deactivateEdit   = null;

function reactivateEditMode() {
  if (deactivateEdit) { deactivateEdit(); deactivateEdit = null; }
  deactivateEdit = activateEditMode(canvasEl, layout, {
    onTap(elementData) {
      if (!elementData) {
        drawer.close();
      } else {
        openElementDrawer(elementData);
      }
    },
  });
}

function setMode(mode) {
  currentMode = mode;

  modeSegmented.querySelectorAll('.seg-btn').forEach(btn => {
    btn.classList.toggle('is-active', btn.dataset.mode === mode);
  });

  addBtn.style.display = mode === 'edit' ? 'flex' : 'none';

  const sceneEl = document.querySelector('.scene');
  if (mode === 'edit') {
    canvasEl.classList.add('is-edit');
    sceneEl.classList.add('is-edit');
    reactivateEditMode();
  } else {
    canvasEl.classList.remove('is-edit');
    sceneEl.classList.remove('is-edit');
    if (deactivateEdit) { deactivateEdit(); deactivateEdit = null; }
    drawer.close();
  }
}

modeSegmented.querySelectorAll('.seg-btn').forEach(btn => {
  btn.addEventListener('click', () => setMode(btn.dataset.mode));
});

// ── Add element ───────────────────────────────────────────────────────────────
addBtn.addEventListener('click', () => {
  drawer.openPalette(
    (type) => {
      const newEl = addElement(layout, type);
      canvasApi.refresh(layout);
      reactivateEditMode();
      openElementDrawer(newEl);
    },
    () => {
      layout.elements = [];
      layout._nextCC   = 70;
      layout._nextNote = 36;
      saveLayout(layout);
      canvasApi.refresh(layout);
      if (deactivateEdit) { deactivateEdit(); deactivateEdit = null; }
      reactivateEditMode();
    }
  );
});

// Init: start in Play mode, add-btn hidden
setMode('play');

// ── MIDI transport ────────────────────────────────────────────────────────────
transport.onActivity((msg) => {
  actLed.classList.add('on');
  clearTimeout(actT);
  actT = setTimeout(() => actLed.classList.remove('on'), 100);

  const label = msg.type === 'cc'
    ? `TX CC${msg.cc} → ${msg.value}`
    : `TX NOTE ${msg.type === 'note_on' ? 'ON' : 'OFF'} ${msg.note}`;
  logEl.textContent = label;
  clearTimeout(logT);
  logT = setTimeout(() => { logEl.textContent = '— READY —'; }, 1500);
});

transport.onMessage((msg) => {
  rxLed.classList.add('on');
  clearTimeout(rxT);
  rxT = setTimeout(() => rxLed.classList.remove('on'), 100);

  const label = msg.type === 'cc'
    ? `RX CC${msg.cc} → ${msg.value}`
    : `RX NOTE ${msg.type === 'note_on' ? 'ON' : 'OFF'} ${msg.note}`;
  logEl.textContent = label;
  clearTimeout(logT);
  logT = setTimeout(() => { logEl.textContent = '— READY —'; }, 1500);

  canvasApi.dispatch(msg);
});

// ── MIDI connection ───────────────────────────────────────────────────────────
function setStatus(text, state, duplex) {
  const prefix = duplex ? '⇄ ' : (state === 'connected' ? '→ ' : '');
  connText.textContent = prefix + text;
  connDot.className = 'conn-dot' + (state ? ` ${state}` : '');
}

function matchInputByName(name, inputs) {
  return inputs.find(p => p.name === name) ?? null;
}

function applySelection(outputId) {
  if (!outputId) return;
  const outputs = transport.getOutputPorts();
  const inputs  = transport.getInputPorts();
  const outPort = outputs.find(p => p.id === outputId);
  if (!outPort) return;

  transport.selectOutputPort(outputId);
  const inPort = matchInputByName(outPort.name, inputs);
  if (inPort) transport.selectInputPort(inPort.id);

  setStatus(outPort.name, 'connected', !!inPort);
}

function populatePorts(outputs) {
  portSelect.innerHTML = '<option value="">— port —</option>';
  outputs.forEach(p => {
    const o = document.createElement('option');
    o.value = p.id; o.textContent = p.name;
    portSelect.appendChild(o);
  });
  portSelect.style.display = outputs.length ? 'block' : 'none';
  if (outputs.length && !transport.isConnected) {
    portSelect.value = outputs[0].id;
    applySelection(outputs[0].id);
  }
}

portSelect.addEventListener('change', () => {
  if (portSelect.value) applySelection(portSelect.value);
});

async function connectMIDI() {
  try {
    const { outputs } = await transport.connect();
    setStatus('READY', 'connected', false);
    overlay.classList.add('hidden');
    populatePorts(outputs);
    transport.onOutputPortsChange(populatePorts);
    transport.onInputPortsChange(() => {
      const selectedOutId = portSelect.value;
      if (selectedOutId) applySelection(selectedOutId);
    });
  } catch {
    setStatus('NO MIDI', 'error', false);
    overlay.classList.remove('hidden');
  }
}

document.getElementById('overlayDismiss').addEventListener('click', () => {
  overlay.classList.add('hidden');
  setStatus('DEMO', '', false);
});

if (navigator.requestMIDIAccess) {
  overlay.classList.add('hidden');
  connectMIDI();
} else {
  setStatus('NO MIDI', 'error', false);
}
</script>
</body>
</html>
